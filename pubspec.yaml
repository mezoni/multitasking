name: multitasking
version: 2.1.0
description: Cooperative multitasking using asynchronous tasks with the ability to safely cancel task groups with nested tasks performing I/O wait or listen operations.
homepage: https://github.com/mezoni/multitasking
topics:
 - cooperative-multitasking
 - asynchronous-programming
 - concurrency
 - cancellation
 - async
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  async: ^2.13.0
  meta: ^1.18.1
  stack_trace: ^1.12.1
dev_dependencies:
  lints: ^6.1.0
  test: ^1.29.0
