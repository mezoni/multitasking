name: multitasking
version: 2.10.0
description: Cooperative multitasking using asynchronous tasks and synchronization primitives, with the ability to safely cancel groups of nested tasks performing I/O wait or listen operations.
homepage: https://github.com/mezoni/multitasking
publish_to: none
topics:
 - parallelism
 - concurrency
 - cancellation
 - synchronization
 - mutex
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  async: ^2.13.0
  defer: ^1.0.0
  meta: ^1.18.1
  stack_trace: ^1.12.1
dev_dependencies:
  http: ^1.6.0
  lints: ^6.1.0
  test: ^1.29.0
